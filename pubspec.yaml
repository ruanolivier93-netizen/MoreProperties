name: more_properties
description: "More Properties — South Africa's premium black-and-green property marketplace built on Flutter and Supabase."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^2.6.1
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  fl_chart: ^1.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

# Pin app_links_web to a version that does not pull the native_assets-based
# `objective_c` package, which fails to build on Windows paths that contain
# spaces (known Flutter SDK quoting bug).
dependency_overrides:
  objective_c: 4.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#050806"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#050806"
    theme_color: "#12F58A"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon.png"

flutter_native_splash:
  color: "#050806"
  image: assets/splash_logo.png
  android_12:
    color: "#050806"
    image: assets/splash_logo.png
  web: false
