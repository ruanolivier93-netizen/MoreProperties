<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="South Africa's premium property marketplace — buy, rent, developments and commercial across SA.">
  <meta name="theme-color" content="#050806">

  <!-- Open Graph -->
  <meta property="og:title" content="More Properties — South Africa">
  <meta property="og:description" content="Find your next address. SA-wide buy, rent, developments and commercial — with bond, transfer-duty and load-shedding tools.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="More Properties — South Africa">
  <meta name="twitter:description" content="Buy, rent and explore South African property with built-in bond, duty and load-shedding tools.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="More Properties">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>More Properties — South Africa</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; background: #050806; color: #ffffff; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
    #splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top left, #0b1f16 0%, #050806 65%);
      z-index: 1;
    }
    #splash .mark {
      width: 92px; height: 92px; border-radius: 50%;
      background: linear-gradient(135deg, #12F58A, #0AB874);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 30px 60px -20px rgba(18, 245, 138, 0.5);
      color: #000; font-weight: 900; font-size: 36px; letter-spacing: -1px;
    }
  </style>
</head>
<body>
  <div id="splash"><div class="mark">M</div></div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var s = document.getElementById('splash');
      if (s) s.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
